# Documentation:
# https://doc.traefik.io/traefik/reference/routing-configuration/dynamic-configuration-methods/
# https://doc.traefik.io/traefik/reference/routing-configuration/http/tls/overview/

http:
  services:
    svc_nextcloud-80:
      loadBalancer:
        servers:
          - url: 'http://{{ env "APP_NAME_HOST" }}_nextcloud:80'
    svc_nextcloud-7867:
      loadBalancer:
        servers:
          - url: 'http://{{ env "APP_NAME_HOST" }}_nextcloud:7867'
  routers:
    nextcloud-80:
      rule: 'Host(`nextcloud.{{ env "APP_HOST" }}`)'
      priority: 1
      service: svc_nextcloud-80
      entryPoints: ["websecure"]
      middlewares:
        - "sts-headers"
        - "cors-policy"
        - "auth-proxy"
      tls:
        certResolver: porkbun-api
    nextcloud-7867:
      rule: 'Host(`nextcloud.{{ env "APP_HOST" }}`) && PathPrefix(`/push`)'
      priority: 3
      service: svc_nextcloud-7867
      entryPoints: ["websecure"]
      middlewares:
        - "sts-headers"
      tls:
        certResolver: porkbun-api
