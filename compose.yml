name: ${APP_NAME_HOST}

networks:
  internal:
    name: ${APP_NAME_HOST}_internal
    driver: bridge
    ipam:
      config:
        - subnet: "${APP_NETWORK_POOL}"

volumes:
  habitat-config:
  nextcloud-main:
  nextcloud-custom_apps:
  nextcloud-config:
  nextcloud-data:
  nextcloud-themes:
  nextcloud-provisioning:

secrets:
  NEXTCLOUD_MYSQL_PASSWORD:
    file: ${SECRETS_DIR}/NEXTCLOUD_MYSQL_PASSWORD
  NEXTCLOUD_MYSQL_PASSWORD_HASH:
    file: ${SECRETS_DIR}/NEXTCLOUD_MYSQL_PASSWORD_HASH
  NEXTCLOUD_ADMIN_PASSWORD:
    file: ${SECRETS_DIR}/NEXTCLOUD_ADMIN_PASSWORD
  NEXTCLOUD_OAUTH_CLIENT_ID:
    file: ${SECRETS_DIR}/NEXTCLOUD_OAUTH_CLIENT_ID
  NEXTCLOUD_OAUTH_CLIENT_SECRET:
    file: ${SECRETS_DIR}/NEXTCLOUD_OAUTH_CLIENT_SECRET
  NEXTCLOUD_OAUTH_CLIENT_SECRET_HASHED_PBKDF2:
    file: ${SECRETS_DIR}/NEXTCLOUD_OAUTH_CLIENT_SECRET_HASHED_PBKDF2
  REDIS_PASSWORD:
    file: ${SECRETS_DIR}/REDIS_PASSWORD


services:

  habitat-config-stash:
    image: tschebbischeff/habitat-config:latest
    container_name: ${APP_NAME_HOST}_habitat-config-stash
    restart: no
    env_file:
      - ./.env
      - path: ${ENV_DIR}/.env
        required: false
      - path: ${ENV_DIR}/habitat-config.env
        required: false
    environment:
      MODULE_NAME: "stash"
    secrets:
      - NEXTCLOUD_MYSQL_PASSWORD_HASH
      - NEXTCLOUD_OAUTH_CLIENT_ID
      - NEXTCLOUD_OAUTH_CLIENT_SECRET_HASHED_PBKDF2
    networks:
      internal:
    volumes:
      - habitat-config:/habitat-config/orchestration
      - ./habitat-config:/habitat-config/source:ro
      - nextcloud-provisioning:/habitat-config/target/nextcloud

  nextcloud:
    build:
      context: ./nextcloud
    container_name: ${APP_NAME_HOST}_nextcloud
    restart: unless-stopped
    expose:
      - '80'
    env_file:
      - ./.env
      - path: ${ENV_DIR}/.env
        required: false
      - path: ${ENV_DIR}/nextcloud.env
        required: false
    environment:
      MYSQL_DATABASE: 'habitat_nextcloud'
      MYSQL_USER: 'nextcloud'
      MYSQL_PASSWORD_FILE: '/run/secrets/NEXTCLOUD_MYSQL_PASSWORD'
      MYSQL_HOST: '${APP_NAME_HOST}_mariadb'
      REDIS_HOST: '${APP_NAME_HOST}_redis'
      REDIS_HOST_PASSWORD_FILE: '/run/secrets/REDIS_PASSWORD'
      NEXTCLOUD_ADMIN_USER: 'admin'
      NEXTCLOUD_ADMIN_PASSWORD_FILE: '/run/secrets/NEXTCLOUD_ADMIN_PASSWORD'
      NEXTCLOUD_UPDATE: '1'
      NEXTCLOUD_TRUSTED_DOMAINS: '*.${APP_HOST}'
      APACHE_BODY_LIMIT: '0'
      APACHE_DISABLE_REWRITE_IP: '1'
      TRUSTED_PROXIES: '${APP_NETWORK_POOL}'
      OVERWRITEHOST: 'nextcloud.${APP_HOST}'
      OVERWRITEPROTOCOL: 'https'
      OVERWRITECLIURL: 'https://nextcloud.${APP_HOST}'
      NEXTCLOUD_OAUTH_CLIENT_ID_FILE: '/run/secrets/NEXTCLOUD_OAUTH_CLIENT_ID'
      NEXTCLOUD_OAUTH_CLIENT_SECRET_FILE: '/run/secrets/NEXTCLOUD_OAUTH_CLIENT_SECRET'
    secrets:
      - NEXTCLOUD_MYSQL_PASSWORD
      - NEXTCLOUD_ADMIN_PASSWORD
      - REDIS_PASSWORD
      - NEXTCLOUD_OAUTH_CLIENT_ID
      - NEXTCLOUD_OAUTH_CLIENT_SECRET
    volumes:
      - nextcloud-main:/var/www/html
      - nextcloud-custom_apps:/var/www/html/custom_apps
      - nextcloud-config:/var/www/html/config
      - ${VOLUME_DIR}/nextcloud-data:/var/www/html/data
      - nextcloud-themes:/var/www/html/themes
      - nextcloud-provisioning:/docker-entrypoint-hooks.d
    networks:
      internal:
    healthcheck:
      test: [ "CMD-SHELL", "curl -sSf 'http://localhost/status.php' | grep -Pq '((\"installed\" *: *true|\"maintenance\" *: *false|\"needsDbUpgrade\" *: *false).*){3}'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      habitat-config-stash:
        condition: service_completed_successfully
